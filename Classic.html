<!doctype html>        
<html lang="en">      
<head>
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CKEditor 5 - Classic UI Demo</title>

  <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
   
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
    textarea { width: 100%; min-height: 220px; }
    #status { font-size: 14px; opacity: 0.85; }
    .btn { padding: 8px 12px; border: 1px solid #ccc; background: #fff; border-radius: 8px; cursor: pointer; }
    .btn:hover { background: #f6f6f6; }
    pre { padding: 12px; border: 1px solid #e5e5e5; border-radius: 10px; overflow: auto; background: #fafafa; }
  </style>
</head>
<body>
  
  <div class="wrap">
    <h1>CKEditor 5 — Classic UI</h1>

    <div class="row">
      <button class="btn" id="btnSetSample">Set sample content</button>
      <button class="btn" id="btnGetHtml">Get HTML</button>
      <button class="btn" id="btnClear">Clear</button>
      <span id="status">Status: not initialized</span>
    </div>

    <textarea id="editorClassic">
    <h2>Classic Editor</h2>
    <p>Type here…</p>
	
    <ul>
      <li>Toolbar stays at the top</li>
      <li>Good for document-style editing</li>
    </ul>
    </textarea>
   
    <h3>Output (HTML)</h3>
    <pre id="output">(click “Get HTML”)</pre>
  </div>
  
  <script>
    
    let classicEditor; 
	
    ClassicEditor.create(document.querySelector("#editorClassic"), {

      toolbar: {
        items: [
          "heading",
          "|",
          "bold", "italic", "underline", "link",
          "|",
          "bulletedList", "numberedList",
          "|",
          "blockQuote",
          "|",
          "undo", "redo"
        ],
        shouldNotGroupWhenFull: true
      },

      link: {
        addTargetToExternalLinks: true,
        defaultProtocol: "https://"
      }
    })

    .then(editor => {
      classicEditor = editor;
      document.getElementById("status").textContent = "Status: initialized (Classic)";
      // Optional: autosave-like output preview
      editor.model.document.on("change:data", () => {
        // lightweight status ping
        document.getElementById("status").textContent = "Status: editing… (Classic)";
        clearTimeout(window.__classicTimer);
        window.__classicTimer = setTimeout(() => {
          document.getElementById("status").textContent = "Status: ready (Classic)";
        }, 500);
      });
    })

    .catch(err => {
      console.error(err);
      document.getElementById("status").textContent = "Status: init failed (see console)";
    });

    document.getElementById("btnSetSample").addEventListener("click", () => {
      if (!classicEditor) return;
      classicEditor.setData(
        `<h2>Sample (Classic)</h2>
         <p>This content was set via <code>editor.setData()</code>.</p>
         <p><a href="https://ckeditor.com">External link</a> opens in a new tab.</p>`
      );
    });	
	
    document.getElementById("btnGetHtml").addEventListener("click", () => {
      if (!classicEditor) return;
      document.getElementById("output").textContent = classicEditor.getData();
      document.getElementById("status").textContent = "Status: HTML exported (Classic)";
    });
	
    document.getElementById("btnClear").addEventListener("click", () => {
      if (!classicEditor) return;
      classicEditor.setData("");
      document.getElementById("output").textContent = "(cleared)";
      document.getElementById("status").textContent = "Status: cleared (Classic)";
    });  	
  </script>
  
</body>
</html>
